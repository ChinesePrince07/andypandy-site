<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">andypandy.org</title>
  <desc id="desc">A personal publishing system shown as an emerald route map connecting projects, writing, photos, travel, and apps.</desc>
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#163d33" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="400" rx="28" fill="#07110e"/>
  <rect width="1200" height="400" rx="28" fill="url(#grid)" opacity=".75"/>
