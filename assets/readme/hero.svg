      <text x="0" y="0" fill="#34d399">PERSONAL PUBLISHING SYSTEM</text>
      <text x="0" y="250" fill="#6ee7b7">&gt; currently building<tspan fill="#f4f7f5"> _</tspan></text>
    </g>
    <text x="0" y="90" fill="#f4f7f5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="76" font-weight="760" letter-spacing="-4">andypandy.org</text>
    <text x="0" y="138" fill="#a8bbb4" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25">Projects, writing, photos, travel, and useful apps.</text>
